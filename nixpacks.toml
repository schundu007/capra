[phases.setup]
nixPkgs = ["nodejs_20", "bash", "sqlite", "gcc", "gpp", "go", "rustc", "openjdk", "graphviz"]
aptPkgs = ["python3", "python3-pip", "python3-requests", "python3-numpy", "python3-pandas", "python3-httpx", "python3-aiohttp", "python3-bs4", "python3-lxml", "python3-sortedcontainers", "graphviz"]

[phases.install]
cmds = [
  "cd backend && npm install",
  "rm -rf /usr/local/lib/python3.12/dist-packages/anthropic* /usr/local/lib/python3.12/dist-packages/pydantic* 2>/dev/null || true",
  "python3 -m pip install --break-system-packages pydantic pydantic-core anthropic diagrams",
  "python3 -c 'import anthropic; print(\"anthropic OK\")' || echo 'anthropic import failed'",
  "python3 -c 'import diagrams; print(\"diagrams OK\")' || echo 'diagrams import failed'"
]

[variables]
PYTHONPATH = "/usr/local/lib/python3.11/dist-packages:/usr/lib/python3/dist-packages"
PIP_TARGET = "/usr/local/lib/python3.11/dist-packages"

[phases.build]
cmds = ["echo 'Backend only - no build required'"]

[start]
cmd = "cd backend && node src/index.js"
