[phases.setup]
nixPkgs = ["nodejs_20", "bash", "sqlite", "gcc", "gpp", "go", "rustc", "openjdk", "graphviz"]
aptPkgs = ["python3", "python3-pip", "python3-requests", "python3-numpy", "python3-pandas", "python3-httpx", "python3-aiohttp", "python3-bs4", "python3-lxml", "python3-sortedcontainers", "graphviz"]

[phases.install]
cmds = [
  "cd backend && npm install",
  "pip3 install --break-system-packages diagrams anthropic",
  "pip3 list | grep -i anthropic || echo 'anthropic not found'",
  "pip3 list | grep -i diagrams || echo 'diagrams not found'"
]

[variables]
PYTHONPATH = "/usr/lib/python3/dist-packages:/usr/local/lib/python3.12/dist-packages:/usr/local/lib/python3.11/dist-packages:/root/.local/lib/python3.11/site-packages"

[phases.build]
cmds = ["echo 'Backend only - no build required'"]

[start]
cmd = "cd backend && node src/index.js"
